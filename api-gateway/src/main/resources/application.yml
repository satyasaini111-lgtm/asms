server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/asms}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/asms/protocol/openid-connect/certs}
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY
        - AddResponseHeader=Strict-Transport-Security, max-age=31536000; includeSubDomains
        - RemoveResponseHeader=Server
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: amenity-service
          uri: lb://amenity-service
          predicates:
            - Path=/api/v1/amenities/**,/api/v1/bookings/**
        - id: support-service
          uri: lb://support-service
          predicates:
            - Path=/api/v1/tickets/**
        - id: visitor-service
          uri: lb://visitor-service
          predicates:
            - Path=/api/v1/visitors/**
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**
        - id: billing-service
          uri: lb://billing-service
          predicates:
            - Path=/api/v1/invoices/**
        - id: helpbot-service
          uri: lb://helpbot-service
          predicates:
            - Path=/api/v1/helpbot/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: WARN
