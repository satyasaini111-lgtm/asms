global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: asms-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8081
          - support-service:8084
          - visitor-service:8085
          - payment-service:8086
          - amenity-service:8083
          - billing-service:8087
          - workflow-service:8088
          - notification-service:8089
          - helpbot-service:8090
          - api-gateway:8080
        labels:
          environment: local

  - job_name: kafka
    static_configs:
      - targets:
          - kafka:9101
