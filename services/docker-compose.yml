services:
  # ─── Data Layer ────────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7.0
    container_name: asms-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: asms
      MONGO_INITDB_ROOT_PASSWORD: asms-secret
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:7.2.0-v11
    container_name: asms-redis
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Kafka KRaft (no ZooKeeper) ────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: asms-kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server kafka:29092 --list 2>/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: asms-schema-registry
    ports:
      - "8091:8081"   # host 8091 to avoid conflict with user-service on 8081
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      kafka:
        condition: service_healthy

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: asms-kafka-ui
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: asms-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      - kafka
      - schema-registry

  # ─── Identity Provider ─────────────────────────────────────────────────────

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: asms-keycloak
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/realms/master/.well-known/openid-configuration"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─── Observability Stack ────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: asms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  loki:
    image: grafana/loki:3.0.0
    container_name: asms-loki
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  tempo:
    image: grafana/tempo:2.5.0
    container_name: asms-tempo
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./infra/tempo/tempo.yaml:/etc/tempo.yaml:ro

  grafana:
    image: grafana/grafana:11.0.0
    container_name: asms-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: asms-grafana
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
      - tempo

  # ─── Microservices ─────────────────────────────────────────────────────────

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: asms-config-server
    ports:
      - "8888:8888"
    environment:
      SPRING_PROFILES_ACTIVE: native
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/actuator/health"]
      interval: 10s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: asms-api-gateway
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/asms
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/asms/protocol/openid-connect/certs
      REDIS_HOST: redis
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: asms-user-service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_user?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  amenity-service:
    build:
      context: .
      dockerfile: amenity-service/Dockerfile
    container_name: asms-amenity-service
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_amenity?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      REDIS_HOST: redis
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  support-service:
    build:
      context: .
      dockerfile: support-service/Dockerfile
    container_name: asms-support-service
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_support?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  visitor-service:
    build:
      context: .
      dockerfile: visitor-service/Dockerfile
    container_name: asms-visitor-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_visitor?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: asms-payment-service
    ports:
      - "8086:8086"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_payment?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  billing-service:
    build:
      context: .
      dockerfile: billing-service/Dockerfile
    container_name: asms-billing-service
    ports:
      - "8087:8087"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_billing?authSource=admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy

  workflow-service:
    build:
      context: .
      dockerfile: workflow-service/Dockerfile
    container_name: asms-workflow-service
    ports:
      - "8088:8088"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://asms:asms-secret@mongodb:27017/asms_workflow?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: asms-notification-service
    ports:
      - "8089:8089"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  helpbot-service:
    build:
      context: .
      dockerfile: helpbot-service/Dockerfile
    container_name: asms-helpbot-service
    ports:
      - "8090:8090"

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:
  loki-data:
