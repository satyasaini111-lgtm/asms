apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: asms-prod
  labels:
    app: payment-service
    version: v1
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8086"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      initContainers:
        - name: wait-for-deps
          image: ${ECR_REGISTRY}/asms/busybox:1.36
          securityContext:
            runAsUser: 10001
          command:
            - sh
            - -c
            - |
              until nc -z mongodb-0.mongodb 27017; do echo "waiting for mongodb"; sleep 3; done
              until nc -z kafka-0.kafka 9092; do echo "waiting for kafka"; sleep 3; done
      containers:
        - name: payment-service
          image: ${ECR_REGISTRY}/asms/payment-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: asms-common-config
            - secretRef:
                name: payment-service-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 120
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: asms-prod
spec:
  selector:
    app: payment-service
  ports:
    - port: 8086
      targetPort: 8086
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: asms-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
