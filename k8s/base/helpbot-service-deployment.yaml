apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpbot-service
  namespace: asms-prod
  labels:
    app: helpbot-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helpbot-service
  template:
    metadata:
      labels:
        app: helpbot-service
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: helpbot-service
          image: ${ECR_REGISTRY}/asms/helpbot-service:${IMAGE_TAG}
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          envFrom:
            - configMapRef:
                name: asms-common-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8090
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8090
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: helpbot-service
  namespace: asms-prod
spec:
  selector:
    app: helpbot-service
  ports:
    - port: 8090
      targetPort: 8090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: helpbot-service-hpa
  namespace: asms-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: helpbot-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
