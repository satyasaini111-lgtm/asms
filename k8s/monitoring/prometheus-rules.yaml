apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: asms-alerts
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: asms.availability
      rules:
        - alert: HighCpuUsage
          expr: avg(rate(process_cpu_usage[5m])) by (application) > 0.90
          for: 5m
          labels:
            severity: critical
            team: asms
          annotations:
            summary: "High CPU on {{ $labels.application }}"
            description: "CPU > 90% for 5 minutes — check HPA scaling"
            runbook: "https://wiki.asms.io/runbooks/high-cpu"

        - alert: HighMemoryUsage
          expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.80
          for: 5m
          labels:
            severity: warning
            team: asms
          annotations:
            summary: "High heap usage on {{ $labels.application }}"

        - alert: Http5xxErrors
          expr: sum(rate(http_server_requests_seconds_count{status=~"5.."}[1m])) by (application) > 100
          labels:
            severity: warning
            team: asms
          annotations:
            summary: "5xx spike on {{ $labels.application }}"

        - alert: HighResponseTime
          expr: |
            histogram_quantile(0.95,
              sum(rate(http_server_requests_seconds_bucket[5m])) by (application, le)
            ) > 2.0
          labels:
            severity: warning
            team: asms
          annotations:
            summary: "p95 latency > 2s on {{ $labels.application }}"

        - alert: KafkaConsumerLag
          expr: kafka_consumer_group_lag > 1000
          for: 5m
          labels:
            severity: warning
            team: asms
          annotations:
            summary: "Kafka lag > 1000 for {{ $labels.consumergroup }}"

        - alert: PaymentFailures
          expr: |
            sum(rate(payment_completed_total[5m]))
            /
            sum(rate(payment_initiated_total[5m])) < 0.99
          for: 5m
          labels:
            severity: critical
            team: asms
          annotations:
            summary: "Payment success rate < 99%"
            runbook: "https://wiki.asms.io/runbooks/payment-failures"
